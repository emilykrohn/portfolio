<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="navbar">
      <div class="navbarItem">
        <a href="index.html">Home</a>
      </div>
      <div class="navbarItem">
        <a href="https://www.linkedin.com/in/emilymkrohn/">LinkedIn</a>
      </div>
      <div class="navbarItem">
        <a href="https://github.com/emilykrohn">GitHub</a>
      </div>
      <div class="navbarItem">
        <a href="images/Resume.pdf">Resume</a>
      </div>
      <div class="navbarItem">
        <button>Contact</button>
      </div>
    </div>

    <div class="about">
        <h1>About</h1>
        <div class="aboutItem">
            <p>Full Stack Programmer</p>
            <p>Hi I’m Emily. I’ve been learning full stack engineering. I used to be interested in making video games but now I’m interested in web development. </p>
        </div>
        <div class="aboutItem">
            <img class="aboutImage" src="images/profile.jpg" alt="Profile Picture">
        </div>
    </div>
    <div class="contact">
        <h2>Contact</h2>
        <div class="contactItem">
            <p class="contactItemText">First Name</p>
            <input type="text" id="firstName" name="firstName">
        </div>
        <div class="contactItem">
            <p class="contactItemText">Last Name</p>
            <input type="text" id="lastName" name="lastName">
        </div>
        <div class="contactItem">
            <p class="contactItemText">Email</p>
            <input type="email" id="email" name="email">
        </div>
        <div class="contactItem">
            <p class="contactItemText">Message</p>
            <textarea id="message" name="message"></textarea>
        </div>
        <div class="contactItem">
            <button>Submit</button>
        </div>
    </div>
</body>
</html>
